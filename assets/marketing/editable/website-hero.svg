<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="900" viewBox="0 0 2400 900" role="img" aria-label="Paste website hero">
  <defs>
    <linearGradient id="pasteGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="0.62" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#6aa9ff"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#151b22"/>
      <stop offset="1" stop-color="#080b0f"/>
    </linearGradient>
    <linearGradient id="darkGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17212a" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#080b0f" stop-opacity="0.62"/>
    </linearGradient>
    <radialGradient id="mintGlow" cx="0.22" cy="0.18" r="0.72">
      <stop offset="0" stop-color="#4ade80" stop-opacity="0.32"/>
      <stop offset="0.44" stop-color="#22d3ee" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#07090c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="0.9" cy="0.04" r="0.62">
      <stop offset="0" stop-color="#8b7bff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#07090c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="blurGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="2400" height="900" rx="0"/>
    </clipPath>
      <linearGradient id="leftFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#07090c" stop-opacity="0.72"/>
      <stop offset="0.42" stop-color="#07090c" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#07090c" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="2400" height="900" fill="#07090c"/>
  
    <g clip-path="url(#roundClip)">
    <image href="../source/campaign-backdrop.png" x="0" y="0" width="2400" height="900" preserveAspectRatio="xMidYMid slice" opacity="0.86"/>
    <rect width="2400" height="900" fill="#07090c" opacity="0.42"/>
    <rect width="2400" height="900" fill="url(#mintGlow)"/>
    <rect width="2400" height="900" fill="url(#violetGlow)"/>
    <rect width="2400" height="900" fill="url(#grid)" opacity="0.52"/>
    <circle cx="432" cy="198" r="252.00000000000003" fill="#4ade80" opacity="0.13" filter="url(#blurGlow)"/>
    <circle cx="2064" cy="144" r="180" fill="#22d3ee" opacity="0.12" filter="url(#blurGlow)"/>
    <rect width="2400" height="900" fill="url(#leftFade)"/>
  </g>
    <g>
    <g transform="translate(126 128) scale(1.75)" opacity="1">
    <rect x="6" y="4.5" width="20" height="23" rx="4.5" fill="none" stroke="url(#pasteGrad)" stroke-width="2.4"/>
    <rect x="11.5" y="2.6" width="9" height="5.4" rx="2.4" fill="none" stroke="url(#pasteGrad)" stroke-width="2.4"/>
    <circle cx="16" cy="18.2" r="3.1" fill="none" stroke="url(#pasteGrad)" stroke-width="2.2"/>
    <path d="M16 21.3v3" stroke="url(#pasteGrad)" stroke-width="2.2" stroke-linecap="round"/>
  </g>
    <text x="200" y="180" fill="#e9eef3" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="56" font-weight="760">Paste</text>
    <text x="203" y="205" fill="#6b7682" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="600">open source and auditable</text>
  </g>
    <text x="126" y="306" fill="#4ade80" opacity="1" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="31" font-weight="720" text-anchor="start">
    <tspan x="126" dy="0">Private clipboard / encrypted on-device</tspan>
  </text>
    <text x="126" y="414" fill="#e9eef3" opacity="1" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="117" font-weight="780" text-anchor="start">
    <tspan x="126" dy="0">One notepad.</tspan>
    <tspan x="126" dy="126">Every device you own.</tspan>
  </text>
    <text x="126" y="715" fill="#9aa6b2" opacity="1" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="41" font-weight="520" text-anchor="start">
    <tspan x="126" dy="0">Copy on your laptop, paste on your phone. Fully encrypted before sync.</tspan>
  </text>
    <g>
    <rect x="126" y="765" width="720" height="84" rx="42" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="147" cy="807" r="4.6" fill="#4ade80"/>
    <text x="164" y="818.52" fill="#9aa6b2" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="32" font-weight="600">No account / no cloud / no plaintext on relays</text>
  </g>
  
</svg>
