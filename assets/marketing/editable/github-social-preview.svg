<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Paste GitHub social preview">
  <defs>
    <linearGradient id="pasteGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="0.62" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#6aa9ff"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#151b22"/>
      <stop offset="1" stop-color="#080b0f"/>
    </linearGradient>
    <linearGradient id="darkGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17212a" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#080b0f" stop-opacity="0.62"/>
    </linearGradient>
    <radialGradient id="mintGlow" cx="0.22" cy="0.18" r="0.72">
      <stop offset="0" stop-color="#4ade80" stop-opacity="0.32"/>
      <stop offset="0.44" stop-color="#22d3ee" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#07090c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="0.9" cy="0.04" r="0.62">
      <stop offset="0" stop-color="#8b7bff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#07090c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="blurGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="1280" height="640" rx="0"/>
    </clipPath>
      <linearGradient id="leftFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#07090c" stop-opacity="0.72"/>
      <stop offset="0.42" stop-color="#07090c" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#07090c" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="#07090c"/>
  
    <g clip-path="url(#roundClip)">
    <image href="../source/campaign-backdrop.png" x="0" y="0" width="1280" height="640" preserveAspectRatio="xMidYMid slice" opacity="0.86"/>
    <rect width="1280" height="640" fill="#07090c" opacity="0.46"/>
    <rect width="1280" height="640" fill="url(#mintGlow)"/>
    <rect width="1280" height="640" fill="url(#violetGlow)"/>
    <rect width="1280" height="640" fill="url(#grid)" opacity="0.52"/>
    <circle cx="230.39999999999998" cy="140.8" r="179.20000000000002" fill="#4ade80" opacity="0.13" filter="url(#blurGlow)"/>
    <circle cx="1100.8" cy="102.4" r="128" fill="#22d3ee" opacity="0.12" filter="url(#blurGlow)"/>
    <rect width="1280" height="640" fill="url(#leftFade)"/>
  </g>
    <g>
    <g transform="translate(96 79) scale(1.84375)" opacity="1">
    <rect x="6" y="4.5" width="20" height="23" rx="4.5" fill="none" stroke="url(#pasteGrad)" stroke-width="2.4"/>
    <rect x="11.5" y="2.6" width="9" height="5.4" rx="2.4" fill="none" stroke="url(#pasteGrad)" stroke-width="2.4"/>
    <circle cx="16" cy="18.2" r="3.1" fill="none" stroke="url(#pasteGrad)" stroke-width="2.2"/>
    <path d="M16 21.3v3" stroke="url(#pasteGrad)" stroke-width="2.2" stroke-linecap="round"/>
  </g>
    <text x="174" y="134" fill="#e9eef3" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="59" font-weight="760">Paste</text>
    <text x="177" y="159" fill="#6b7682" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="600">Private clipboard / encrypted on-device</text>
  </g>
    <text x="96" y="282" fill="#e9eef3" opacity="1" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="83" font-weight="800" text-anchor="start">
    <tspan x="96" dy="0">Private clipboard sync,</tspan>
    <tspan x="96" dy="90">open source and auditable.</tspan>
  </text>
    <text x="96" y="435" fill="#9aa6b2" opacity="1" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="29" font-weight="540" text-anchor="start">
    <tspan x="96" dy="0">Paste keeps notes and clips encrypted on-device before peer-to-peer sync.</tspan>
  </text>
    <g>
    <rect x="96" y="525" width="243" height="42" rx="21" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="117" cy="546" r="4.6" fill="#4ade80"/>
    <text x="134" y="552.84" fill="#9aa6b2" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="19" font-weight="600">Apache-2.0</text>
  </g><g>
    <rect x="378" y="525" width="243" height="42" rx="21" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="399" cy="546" r="4.6" fill="#4ade80"/>
    <text x="416" y="552.84" fill="#9aa6b2" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="19" font-weight="600">No telemetry</text>
  </g><g>
    <rect x="660" y="525" width="243" height="42" rx="21" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="681" cy="546" r="4.6" fill="#4ade80"/>
    <text x="698" y="552.84" fill="#9aa6b2" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="19" font-weight="600">Verifier included</text>
  </g>
  
</svg>
