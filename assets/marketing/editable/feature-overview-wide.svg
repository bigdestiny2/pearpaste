<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Paste feature overview">
  <defs>
    <linearGradient id="pasteGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="0.62" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#6aa9ff"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#151b22"/>
      <stop offset="1" stop-color="#080b0f"/>
    </linearGradient>
    <linearGradient id="darkGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17212a" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#080b0f" stop-opacity="0.62"/>
    </linearGradient>
    <radialGradient id="mintGlow" cx="0.22" cy="0.18" r="0.72">
      <stop offset="0" stop-color="#4ade80" stop-opacity="0.32"/>
      <stop offset="0.44" stop-color="#22d3ee" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#07090c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="0.9" cy="0.04" r="0.62">
      <stop offset="0" stop-color="#8b7bff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#07090c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="blurGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="1600" height="900" rx="0"/>
    </clipPath>
      <linearGradient id="leftFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#07090c" stop-opacity="0.72"/>
      <stop offset="0.42" stop-color="#07090c" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#07090c" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="#07090c"/>
  
    <g clip-path="url(#roundClip)">
    <image href="../source/campaign-backdrop.png" x="0" y="0" width="1600" height="900" preserveAspectRatio="xMidYMid slice" opacity="0.82"/>
    <rect width="1600" height="900" fill="#07090c" opacity="0.5"/>
    <rect width="1600" height="900" fill="url(#mintGlow)"/>
    <rect width="1600" height="900" fill="url(#violetGlow)"/>
    <rect width="1600" height="900" fill="url(#grid)" opacity="0.52"/>
    <circle cx="288" cy="198" r="252.00000000000003" fill="#4ade80" opacity="0.13" filter="url(#blurGlow)"/>
    <circle cx="1376" cy="144" r="180" fill="#22d3ee" opacity="0.12" filter="url(#blurGlow)"/>
    <rect width="1600" height="900" fill="url(#leftFade)"/>
  </g>
    <g>
    <g transform="translate(96 92) scale(1.9375)" opacity="1">
    <rect x="6" y="4.5" width="20" height="23" rx="4.5" fill="none" stroke="url(#pasteGrad)" stroke-width="2.4"/>
    <rect x="11.5" y="2.6" width="9" height="5.4" rx="2.4" fill="none" stroke="url(#pasteGrad)" stroke-width="2.4"/>
    <circle cx="16" cy="18.2" r="3.1" fill="none" stroke="url(#pasteGrad)" stroke-width="2.2"/>
    <path d="M16 21.3v3" stroke="url(#pasteGrad)" stroke-width="2.2" stroke-linecap="round"/>
  </g>
    <text x="178" y="150" fill="#e9eef3" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="62" font-weight="760">Paste</text>
    <text x="181" y="178" fill="#6b7682" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600">Private clipboard / encrypted on-device</text>
  </g>
    <text x="96" y="292" fill="#4ade80" opacity="1" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="24" font-weight="760" text-anchor="start">
    <tspan x="96" dy="0">Product overview</tspan>
  </text>
    <text x="96" y="388" fill="#e9eef3" opacity="1" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="72" font-weight="830" text-anchor="start">
    <tspan x="96" dy="0">One private</tspan>
    <tspan x="96" dy="78">notepad for</tspan>
    <tspan x="96" dy="78">every device.</tspan>
  </text>
    <text x="96" y="650" fill="#9aa6b2" opacity="1" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="28" font-weight="540" text-anchor="start">
    <tspan x="96" dy="0">Paste syncs clipboard text and private notes</tspan>
    <tspan x="96" dy="38">across your own devices, encrypted locally</tspan>
    <tspan x="96" dy="38">before anything touches the network.</tspan>
  </text>
    <g>
    <rect x="96" y="760" width="188" height="54" rx="27" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="117" cy="787" r="4.6" fill="#4ade80"/>
    <text x="134" y="794.92" fill="#9aa6b2" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="22" font-weight="600">No account</text>
  </g>
    <g>
    <rect x="308" y="760" width="170" height="54" rx="27" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="329" cy="787" r="4.6" fill="#4ade80"/>
    <text x="346" y="794.92" fill="#9aa6b2" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="22" font-weight="600">No cloud</text>
  </g>
    <g>
    <rect x="502" y="760" width="214" height="54" rx="27" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="523" cy="787" r="4.6" fill="#4ade80"/>
    <text x="540" y="794.92" fill="#9aa6b2" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="22" font-weight="600">Open source</text>
  </g>
    <rect x="882" y="154" width="628" height="642" rx="34" fill="#05070a" fill-opacity="0.54" stroke="#ffffff" stroke-opacity="0.08"/>
    <g>
      <rect x="918" y="202" width="556" height="86" rx="18" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.1"/>
      <circle cx="956" cy="245" r="8" fill="#4ade80"/>
      <text x="986" y="237" fill="#e9eef3" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="25" font-weight="760">Private clipboard</text>
      <text x="986" y="264" fill="#9aa6b2" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="520">Copy on one device and paste on another.</text>
    </g>
<g>
      <rect x="918" y="314" width="556" height="86" rx="18" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.1"/>
      <circle cx="956" cy="357" r="8" fill="#22d3ee"/>
      <text x="986" y="349" fill="#e9eef3" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="25" font-weight="760">Encrypted notes</text>
      <text x="986" y="376" fill="#9aa6b2" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="520">Save snippets as sealed notes with local keys.</text>
    </g>
<g>
      <rect x="918" y="426" width="556" height="86" rx="18" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.1"/>
      <circle cx="956" cy="469" r="8" fill="#4ade80"/>
      <text x="986" y="461" fill="#e9eef3" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="25" font-weight="760">Tap-to-decrypt</text>
      <text x="986" y="488" fill="#9aa6b2" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="520">Rows stay sealed until you choose to open them.</text>
    </g>
<g>
      <rect x="918" y="538" width="556" height="86" rx="18" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.1"/>
      <circle cx="956" cy="581" r="8" fill="#22d3ee"/>
      <text x="986" y="573" fill="#e9eef3" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="25" font-weight="760">Peer-to-peer sync</text>
      <text x="986" y="600" fill="#9aa6b2" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="520">No account, no cloud, optional blind relays.</text>
    </g>
<g>
      <rect x="918" y="650" width="556" height="86" rx="18" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.1"/>
      <circle cx="956" cy="693" r="8" fill="#4ade80"/>
      <text x="986" y="685" fill="#e9eef3" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="25" font-weight="760">Open verifier</text>
      <text x="986" y="712" fill="#9aa6b2" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="520">Inspect local storage and relay exports yourself.</text>
    </g>
  
</svg>
