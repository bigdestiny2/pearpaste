apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]
    //   PearPaste: empty => the `debug` variant EMBEDS the JS bundle (offline,
    //   no Metro at runtime). Required to run reliably on a physical device
    //   (Metro-over-adb-reverse stalls delivering the ~10MB bundle; embedding
    //   removes that path entirely and matches a shippable build).
    debuggableVariants = []

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

def ppReleaseProp = { name ->
    def v = project.findProperty(name)
    if (v == null || String(v).trim().isEmpty()) v = System.getenv(name)
    return v == null ? null : String(v).trim()
}

def ppReleaseStoreFile = ppReleaseProp("PEARPASTE_ANDROID_KEYSTORE")
def ppReleaseStorePassword = ppReleaseProp("PEARPASTE_ANDROID_KEYSTORE_PASSWORD")
def ppReleaseKeyAlias = ppReleaseProp("PEARPASTE_ANDROID_KEY_ALIAS")
def ppReleaseKeyPassword = ppReleaseProp("PEARPASTE_ANDROID_KEY_PASSWORD")
def ppReleaseSigningConfigured = [
    ppReleaseStoreFile,
    ppReleaseStorePassword,
    ppReleaseKeyAlias,
    ppReleaseKeyPassword
].every { it != null && it.length() > 0 }
def ppReleaseStoreFileObject = ppReleaseStoreFile == null ? null : file(ppReleaseStoreFile)

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.pearpaste"
    defaultConfig {
        applicationId "com.pearpaste"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        manifestPlaceholders = [usesCleartextTraffic: "false"]
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (ppReleaseSigningConfigured) {
                storeFile ppReleaseStoreFileObject
                storePassword ppReleaseStorePassword
                keyAlias ppReleaseKeyAlias
                keyPassword ppReleaseKeyPassword
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            manifestPlaceholders = [usesCleartextTraffic: "true"]
        }
        release {
            if (ppReleaseSigningConfigured) {
                signingConfig signingConfigs.release
            }
            manifestPlaceholders = [usesCleartextTraffic: "false"]
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

gradle.taskGraph.whenReady { graph ->
    def releasePackageTask = graph.allTasks.any { task ->
        def n = task.name.toLowerCase(Locale.ROOT)
        n.contains("release") &&
            (n.startsWith("assemble") || n.startsWith("bundle") ||
                n.startsWith("package") || n.startsWith("install"))
    }
    if (releasePackageTask) {
        if (!ppReleaseSigningConfigured) {
            throw new GradleException(
                "PearPaste Android release signing is not configured. " +
                "Set PEARPASTE_ANDROID_KEYSTORE, PEARPASTE_ANDROID_KEYSTORE_PASSWORD, " +
                "PEARPASTE_ANDROID_KEY_ALIAS, and PEARPASTE_ANDROID_KEY_PASSWORD " +
                "as Gradle properties or environment variables. Release builds must " +
                "not use the checked-in debug.keystore."
            )
        }
        if (!ppReleaseStoreFileObject.exists()) {
            throw new GradleException(
                "PearPaste Android release keystore not found at ${ppReleaseStoreFileObject}. " +
                "Set PEARPASTE_ANDROID_KEYSTORE to an existing private keystore."
            )
        }
        if (ppReleaseStoreFileObject.canonicalFile == file("debug.keystore").canonicalFile) {
            throw new GradleException(
                "PearPaste Android release signing cannot use the checked-in debug.keystore. " +
                "Generate a private release keystore and set PEARPASTE_ANDROID_KEYSTORE to it."
            )
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

// ---------------------------------------------------------------------------
// PearPaste: link the Pear-end's Bare native addons into react-native-bare-kit.
//
// react-native-bare-kit's stock link.mjs runs `bare-link` graph-rooted at THIS
// RN host project, so it only finds bare-kit's own core addons. PearPaste's
// Pear-end native deps (sodium-native, rocksdb-native, udx-native, quickbit /
// rabin / crc / simdle-native, bare-crypto, fs-native-extensions, …) are
// installed at the REPO ROOT (../../.. — the shared backend's node_modules) and
// are only referenced inside the bare-pack bundle as `linked:` specifiers.
//
// This task runs `bare-link` against the repo root and writes the resolved
// Android addon prebuilds into bare-kit's jniLibs source dir so they are
// packaged into the APK. Without it the app builds but the worklet crashes at
// runtime loading sodium/rocksdb/udx. bare-link merges into the out dir, so it
// composes safely with bare-kit's own link step.
def ppRepoRoot = rootProject.projectDir.parentFile.parentFile.parentFile // android -> RN proj -> mobile -> repo
def ppBareKitAddons = new File(rootProject.projectDir, "../node_modules/react-native-bare-kit/android/src/main/addons")
def ppBareLink = new File(rootProject.projectDir, "../node_modules/.bin/bare-link")
def ppBarePack = new File(rootProject.projectDir, "../node_modules/.bin/bare-pack")
def ppBareWorklet = new File(ppRepoRoot, "mobile/backend/worklet.mjs")
def ppBareAndroidBundle = new File(ppRepoRoot, "mobile/backend/app.android.bundle.js")

tasks.register("pearpasteBundleBareWorklet", Exec) {
    description = "Bundle the PearPaste Bare worklet with the local bare-pack binary"
    workingDir ppRepoRoot
    doFirst {
        if (!ppBarePack.exists()) {
            throw new GradleException("bare-pack not found at ${ppBarePack}. Run npm install --legacy-peer-deps in mobile/PearPasteMobile first.")
        }
        if (!ppBareWorklet.exists()) {
            throw new GradleException("PearPaste Bare worklet entry not found at ${ppBareWorklet}.")
        }
    }
    // No outputs are declared: node_modules native-addon changes can otherwise
    // leave a stale linked bundle outside Gradle's normal input tracking.
    commandLine ppBarePack.absolutePath, "--linked",
        "--host", "android-arm64",
        "--host", "android-arm",
        "--host", "android-ia32",
        "--host", "android-x64",
        "--out", ppBareAndroidBundle.absolutePath,
        ppBareWorklet.absolutePath
}

tasks.register("pearpasteLinkBareAddons", Exec) {
    description = "Link PearPaste Pear-end Bare native addons (repo root) into react-native-bare-kit"
    workingDir ppRepoRoot
    doFirst {
        if (!ppBareLink.exists()) {
            throw new GradleException("bare-link not found at ${ppBareLink}. Run npm install in mobile/PearPasteMobile first.")
        }
    }
    commandLine ppBareLink.absolutePath, ".",
        "--host", "android-arm64",
        "--host", "android-arm",
        "--host", "android-ia32",
        "--host", "android-x64",
        "--out", ppBareKitAddons.absolutePath
}

preBuild.dependsOn "pearpasteBundleBareWorklet", "pearpasteLinkBareAddons"
