# PearPaste CI — Agent 5 (Security, QA, Release).
#
# Spec refs: §16 (testing strategy), §17 (release & supply-chain), §21 Agent 5
# acceptance ("CI fails on plaintext sentinel leak", "CI fails on unsigned
# release artifact", lockfile + dependency audit).
#
# Jobs:
#   test            lint + unit + integration + e2e + security + mobile smoke
#                   (Node 22)
#   linux-package   Linux package/preflight coverage for the Pear runtime
#                   launcher path
#   mobile-app      React Native app lockfile + npm ci + lint + Jest
#   sentinel-guard  builds a fresh vault, runs the independent verifier, and
#                   greps the repo/artifacts for SENTINEL_PREFIX — FAILS the
#                   build on any plaintext sentinel leak (§21 acceptance #1)
#   supply-chain    lockfile-presence check + `npm audit` (§17 pre-beta list)
#   release-guard   FAILS on an unsigned release artifact (§21 acceptance #2);
#                   honest model — checks for signature sidecars and documents
#                   the gate, since real signing certs are out of scope here

name: ci

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  SENTINEL_PREFIX: PEARPASTE_PLAINTEXT_SENTINEL_

jobs:
  test:
    name: lint + tests (node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: E2E tests (headless)
        run: npm run test:e2e

      - name: Security tests
        run: npm run test:security

      - name: Mobile worklet smoke tests
        run: npm run test:mobile

  sentinel-guard:
    name: sentinel leak guard (FAILS build on plaintext leak)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Create a fresh vault with a known sentinel and run the verifier
        # Drives the REAL Pear-end: creates a vault, writes a note + clip whose
        # bodies embed the plaintext sentinel, flushes to the on-disk
        # Corestore, then runs the independent verifier (scripts/
        # verify-encryption.js, which reuses scripts/verify-encryption.js's
        # backend/verifier.js scanners). The verifier exits non-zero on ANY
        # sentinel in storage bytes or relay-export mirror — that fails this
        # step and the build (§8.4, §21 acceptance #1).
        run: |
          set -euo pipefail
          export VAULT_DIR="$(mktemp -d)"
          node -e '
            import("./backend/index.js").then(async ({ createPearEnd }) => {
              const { COMMANDS } = await import("./backend/rpc.js");
              const dir = process.env.VAULT_DIR;
              const S = process.env.SENTINEL_PREFIX;
              const pe = await createPearEnd({ storagePath: dir });
              await pe.call(COMMANDS.CREATE_VAULT, { label: "ci", platform: "linux", passphrase: "ci-pw" });
              await pe.call(COMMANDS.NOTE_UPSERT, { note: { title: S + "TITLE", body: S + "BODY_should_be_sealed", tags: [S + "TAG"] } });
              await pe.call(COMMANDS.CLIP_CAPTURE, { kind: "text", body: S + "CLIP_should_be_sealed" });
              if (pe.ctx.sync && pe.ctx.sync._opened) { try { await pe.ctx.sync.refresh(); } catch (_) {} }
              await pe.call(COMMANDS.LOCK_VAULT, {});
              await new Promise(r => setTimeout(r, 400));
              await pe.close();
              process.exit(0);
            }).catch(e => { console.error(e); process.exit(2); });
          '
          echo "::group::verifier (storage + relay-export scan)"
          node scripts/verify-encryption.js "$VAULT_DIR"
          echo "::endgroup::"
          rm -rf "$VAULT_DIR"

      - name: Grep the repo + test artifacts for a leaked sentinel
        # Belt-and-suspenders next to the verifier: no source file, fixture, or
        # committed artifact may contain the raw sentinel PREFIX followed by
        # leak-shaped content. The constant DEFINITION in shared-ops.js and
        # deliberate test usages (string built at runtime) are expected; a
        # committed file containing the literal prefix+payload is a leak.
        run: |
          set -uo pipefail
          # Exclude node_modules, .git, the shared-ops definition line, docs
          # (which quote the prefix to explain it), and test sources (which
          # construct sentinels at runtime by design).
          HITS="$(grep -RIn --binary-files=without-match \
            --exclude-dir=node_modules --exclude-dir=.git \
            --exclude-dir=docs --exclude-dir=test \
            --exclude='package-lock.json' \
            "${SENTINEL_PREFIX}[A-Za-z0-9_]" . || true)"
          # Drop the legitimate constant definition in backend/shared-ops.js.
          HITS="$(printf '%s\n' "$HITS" | grep -v 'backend/shared-ops.js' || true)"
          if [ -n "$HITS" ]; then
            echo "PLAINTEXT SENTINEL LEAK — committed file(s) contain the sentinel:"
            printf '%s\n' "$HITS"
            exit 1
          fi
          echo "no leaked sentinel in committed source / artifacts"

  supply-chain:
    name: lockfile + dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Lockfile must be committed (§17 supply-chain)
        run: |
          set -euo pipefail
          if [ ! -f package-lock.json ]; then
            echo "package-lock.json is NOT committed — required before public beta (§17)"
            exit 1
          fi
          echo "package-lock.json present"

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Dependency audit (§17 dependency audit)
        # High/critical advisories fail the build. Production deps only — the
        # Pear-end ships these; dev tooling (standard, brittle) is not shipped.
        run: |
          set -uo pipefail
          npm audit --omit=dev --audit-level=high
          STATUS=$?
          if [ "$STATUS" -ne 0 ]; then
            echo "npm audit found high/critical advisories in shipped deps (§17)"
            exit "$STATUS"
          fi
          echo "no high/critical advisories in shipped dependencies"

  linux-package:
    name: linux package preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Linux packaging preflight
        run: npm run preflight:linux

      - name: Linux packaging dry run
        run: npm run build:linux:dry

  mobile-app:
    name: mobile app install + lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: mobile/PearPasteMobile
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/PearPasteMobile/package-lock.json

      - name: Mobile lockfiles must be committed
        run: |
          set -euo pipefail
          for f in package-lock.json Gemfile.lock ios/Podfile.lock; do
            if [ ! -s "$f" ]; then
              echo "mobile lockfile missing or empty: $f"
              exit 1
            fi
          done
          echo "mobile JS, Ruby, and CocoaPods lockfiles present"

      - name: Install mobile app (clean, from lockfile)
        run: npm ci

      - name: Mobile lint
        # polyfills.js intentionally uses bitwise operations for base64 and
        # older RN ESLint config does not predeclare globalThis. Keep the gate
        # blocking while making those two intentional cases explicit here.
        run: npm run lint -- --global globalThis --rule no-bitwise:off --max-warnings=0

      - name: Mobile Jest tests
        run: npm test -- --runInBand

  release-guard:
    name: release artifact must be signed (FAILS on unsigned)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Verifier-gated release check (§17 verifier-gated release)
        # A release is only valid if the independent verifier passes on a fresh
        # build. We assert the verifier exits 0 on a clean vault and, critically,
        # exits NON-ZERO on a planted leak — proving the release gate has teeth.
        run: |
          set -euo pipefail
          export CLEAN="$(mktemp -d)"
          node -e '
            import("./backend/index.js").then(async ({ createPearEnd }) => {
              const { COMMANDS } = await import("./backend/rpc.js");
              const pe = await createPearEnd({ storagePath: process.env.CLEAN });
              await pe.call(COMMANDS.CREATE_VAULT, { label: "rel", platform: "linux", passphrase: "pw" });
              await pe.call(COMMANDS.NOTE_UPSERT, { note: { title: "t", body: "ordinary note body" } });
              if (pe.ctx.sync && pe.ctx.sync._opened) { try { await pe.ctx.sync.refresh(); } catch (_) {} }
              await pe.call(COMMANDS.LOCK_VAULT, {});
              await new Promise(r => setTimeout(r, 300));
              await pe.close(); process.exit(0);
            }).catch(e => { console.error(e); process.exit(2); });
          '
          node scripts/verify-encryption.js "$CLEAN"
          LEAK="$(mktemp -d)"
          printf '%sLEAK' "$SENTINEL_PREFIX" > "$LEAK/planted.bin"
          if node scripts/verify-encryption.js "$LEAK"; then
            echo "release gate is broken: verifier passed a planted leak"
            exit 1
          fi
          echo "verifier-gated release: clean PASS, planted leak correctly FAILS"
          rm -rf "$CLEAN" "$LEAK"

      - name: Unsigned release artifact guard (§21 Agent 5 acceptance #2)
        # HONEST MODEL (real signing certs are out of scope per the brief):
        # a release artifact directory (RELEASE_ARTIFACTS, default dist/) must
        # contain, for every distributable file, a detached signature sidecar
        # (.sig / .asc / .minisig / .p7s). If artifacts exist with NO matching
        # signature -> FAIL the build (unsigned release blocked). If no
        # artifacts are present (normal PR/CI), the gate is documented and
        # passes — it activates on release builds that produce artifacts. The
        # signing procedure + the real cert TODO live in docs/RELEASE.md.
        run: |
          set -euo pipefail
          ART_DIR="${RELEASE_ARTIFACTS:-dist}"
          if [ ! -d "$ART_DIR" ]; then
            echo "no release artifacts in '$ART_DIR' — signing gate documented;"
            echo "it activates on release builds (see docs/RELEASE.md §17)."
            exit 0
          fi
          UNSIGNED=0
          while IFS= read -r -d '' f; do
            case "$f" in
              *.sig|*.asc|*.minisig|*.p7s|*.sha256|*.sbom.json) continue ;;
            esac
            if [ ! -e "$f.sig" ] && [ ! -e "$f.asc" ] && \
               [ ! -e "$f.minisig" ] && [ ! -e "$f.p7s" ]; then
              echo "UNSIGNED release artifact (no detached signature): $f"
              UNSIGNED=1
            fi
          done < <(find "$ART_DIR" -type f -print0)
          if [ "$UNSIGNED" -ne 0 ]; then
            echo "release blocked: one or more artifacts are unsigned (§21)"
            exit 1
          fi
          echo "all release artifacts have a detached signature sidecar"
        env:
          RELEASE_ARTIFACTS: ""

  # Windows build readiness (spec §12/§17, Agent 3 distribution). Proves the
  # app installs + runs its encryption invariant on win32: npm ci pulls the
  # sodium-native win32-x64 prebuild (the only native addon; everything else is
  # pure-JS + Bare), the Windows preflight gate must pass, and the verifier
  # runs against a fresh vault created on Windows. The standalone signed .exe
  # (Authenticode) is gated by release-guard above + documented in
  # docs/RELEASE.md §3 — real certs are out of repo scope (spec §17).
  windows-build:
    name: windows build readiness (win32-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install (clean, from lockfile)
        run: npm ci
      - name: Windows build preflight (FAILS on win32 incompatibility)
        run: npm run preflight:win
      - name: Encryption invariant on Windows (fresh vault + verifier)
        shell: bash
        run: |
          set -euo pipefail
          VAULT_DIR="$RUNNER_TEMP/pp-win-vault"
          node -e "import('./backend/index.js').then(async m=>{const{COMMANDS}=await import('./backend/rpc.js');const p=await m.createPearEnd({storagePath:process.env.VAULT_DIR});await p.call(COMMANDS.CREATE_VAULT,{label:'ci-win',platform:'windows',passphrase:'pw'});await p.call(COMMANDS.NOTE_UPSERT,{note:{title:'t',body:'win-secret-body',bodyFormat:'plain',tags:[]}});await p.close()})"
          node scripts/verify-encryption.js "$VAULT_DIR"
        env:
          VAULT_DIR: ${{ runner.temp }}\pp-win-vault
      - name: Windows distribution note
        shell: bash
        run: |
          echo "Tier 1 (P2P): 'pear stage <link>' from any OS -> Windows users"
          echo "  'pear run pear://<key>' (Pear fetches win32-x64 runtime + prebuild)."
          echo "Tier 2 (.exe): 'npm run release:win' on a Windows host with an"
          echo "  Authenticode cert (PEARPASTE_WIN_CERT). Unsigned artifacts are"
          echo "  blocked by the release-guard job. See docs/RELEASE.md §3."
